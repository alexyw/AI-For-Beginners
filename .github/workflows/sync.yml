name: 同步到私有 Gitea

on:
  push:                # 当有代码推送时触发
  workflow_dispatch:   # 允许手动触发
  schedule:
    - cron: '0 */12 * * *' # 每 6 小时自动强制同步一次，防止漏掉镜像更新

jobs:
  mirror_to_gitea:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设为 0，否则无法获取完整的历史记录和所有分支

      - name: 强制推送到 Gitea
        run: |
          # 1. 提取原始 URL（去掉协议头）
          # 假设 GITEA_URL 是 http://mydomain.com:1070/alex/repo.git
          RAW_URL=$(echo "${{ secrets.GITEA_URL }}" | sed -E 's/https?:\/\///')

          # 2. 重新构造带 Token 的认证地址
          # Gitea 的 PAT 令牌可以直接作为“用户名”放在 URL 中，无需密码
          # 最终格式: http://TOKEN@mydomain.com:1070/alex/repo.git
          AUTH_URL="http://${{ secrets.GITEA_TOKEN }}@${RAW_URL}"

          # 3. 执行镜像推送
          # 使用 -c http.sslVerify=false 是为了防止自签名证书导致的问题（如果以后改用 https）
          git -c http.sslVerify=false push --mirror "$AUTH_URL"
